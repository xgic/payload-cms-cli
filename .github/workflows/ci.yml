name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install core, dev module, and package
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/xgic/cli.git@main"
          pip install "git+https://github.com/xgic/dev-cli.git@main"
          pip install -e ".[dev]"
          # Domain wheels must not replace core xgic.cli __init__; reassert core last.
          pip install --force-reinstall --no-deps "git+https://github.com/xgic/cli.git@main"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q

  package-smoke:
    name: Package smoke (uv build + clean install)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Build sdist and wheel
        run: uv build

      - name: Clean-env install (full stack)
        run: |
          uv venv .venv-smoke
          source .venv-smoke/bin/activate
          uv pip install --upgrade pip
          uv pip install "git+https://github.com/xgic/cli.git@main"
          uv pip install "git+https://github.com/xgic/dev-cli.git@main"
          uv pip install dist/*.whl
          uv pip install --force-reinstall --no-deps "git+https://github.com/xgic/cli.git@main" || true
          xgic --version
          xgic payload --help
          xgic payload setup --help
          xgic payload env --help
          python -c "from xgic.cli import __version__; from xgic.cli.payload import ensure_payload_project; print(__version__)"
