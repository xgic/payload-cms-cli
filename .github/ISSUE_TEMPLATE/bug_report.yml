name: Bug report
description: Report a problem with XGIC CLI core
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety
      options:
        - label: This report does not include private hosts, private tracker IDs, internal paths, or secrets
          required: true
